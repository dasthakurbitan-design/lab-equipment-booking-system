<!DOCTYPE html>
<html>
<head>
    <title>Lab Booking Success</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .card {
            border-radius: 15px;
            max-width: 450px;
            width: 100%;
        }
    </style>
</head>

<body style="
    background: linear-gradient(135deg,#43e97b,#38f9d7);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
">

<div class="card shadow p-4 text-center">

    <h2 class="text-success">✅ Lab Booked Successfully!</h2>
    <hr>

    <p><b>👨‍🏫 Teacher:</b> {{ booking.teacher_name }}</p>
    <p><b>🏫 Lab:</b> {{ booking.lab }}</p>
    <p><b>📅 Date:</b> {{ booking.date }}</p>
    <p><b>⏰ Time:</b> {{ booking.time }} - {{ booking.end_time }}</p>
    <p><b>⌛ Duration:</b> {{ booking.duration_display }}</p>

    <a href="{% url 'home' %}" class="btn btn-primary mt-3">
        🔙 Back to Home
    </a>

    <!-- 🔥 Screenshot Notice -->
    <p class="mt-3 text-muted">
        📸 Please take a screenshot of this confirmation for your record
    </p>

</div>

</body>
</html>
